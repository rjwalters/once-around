name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Typecheck (web)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The web typecheck imports generated bindings from src/wasm/sky_engine
      # (a gitignored build artifact), so the WASM module must be built first.
      - name: Build WASM module
        run: pnpm --filter once-around-web build:wasm

      # BASELINE: Two known type errors are owned by #16 (the ManagedLabelInfo
      # `worldPos` field). They are intentionally left in place on this branch,
      # so a bare `tsc --noEmit` would exit non-zero and paint this check red on
      # every PR until #16 lands. Instead of suppressing errors in the code
      # (no `@ts-ignore`), we baseline exactly those two errors here: the step
      # prints all output, then fails only on UNEXPECTED `error TS` lines. This
      # enforces the real contract — "no new type errors and no regression of
      # the fixed ones" — while going green today.
      #
      # REMOVE THIS BASELINE when #16 merges: delete the grep -vE filter below
      # and restore the plain `pnpm --filter once-around-web typecheck` step.
      # Ideally #16 removes this filter as part of its own PR.
      - name: Typecheck (baseline the two #16 worldPos errors)
        run: |
          set -o pipefail
          out=$(pnpm --filter once-around-web typecheck 2>&1) || true
          echo "$out"
          # Drop the two errors tracked by #16, then fail if anything else remains.
          unexpected=$(echo "$out" | grep -E "error TS" \
            | grep -vE "comets\.ts\(97,|meteor-showers\.ts\(194," || true)
          if [ -n "$unexpected" ]; then
            echo "::error::Unexpected type errors (not the two tracked by #16):"
            echo "$unexpected"
            exit 1
          fi
