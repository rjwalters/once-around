name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-test:
    name: Unit tests (web geometry)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Geometry tests are pure TypeScript (no Rust / wasm-pack needed), so this
      # job intentionally omits the WASM build and stays well under the <10 s
      # acceptance threshold.
      - name: Run unit tests
        run: pnpm --filter once-around-web test:unit

  rust-test:
    name: Rust tests (sky_engine_core + sky_engine)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # Caches ~/.cargo registry/git plus the workspace target dir keyed on
      # Cargo.lock, so incremental runs skip recompiling unchanged dependencies.
      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."

      # Test-only job by design: the astronomy engine's tolerance-based suites
      # (53 library unit tests + JPL Horizons accuracy) complete in well under a
      # minute, so an engine regression now fails CI instead of merging
      # unnoticed. Linting is intentionally excluded — there is a known
      # pre-existing clippy::approx_constant error and the package is not
      # rustfmt-clean (tracked separately in issue #66), which would otherwise
      # block this job.
      #
      # The tests/golden_positions.rs suite is intentionally NOT run here. It
      # pins full-precision f64 outputs with exact-equality (`assert_eq!`, no
      # tolerance) and its own documented contract forbids adding tolerances.
      # Those constants were captured on the developer's macOS/Apple Silicon
      # machine; on CI's x86_64 Linux they differ by 1-2 ULP (e.g. Sun
      # direction.x -0.2351194894444659 vs ...661) because the two platforms'
      # libm trig implementations round differently. It is a within-platform
      # bit-identity guard, not a cross-platform one, so it must not be added to
      # this Linux job — instead it runs on the dedicated macOS `rust-golden-test`
      # job below, on the same Apple Silicon platform its constants were captured
      # on. See issue #75 for the analysis.
      - name: Run Rust tests
        run: cargo test -p sky_engine_core --lib --test horizons_accuracy

      # The `sky_engine` crate owns `find_passes` and its legacy-scan equivalence
      # test. It builds/tests natively as an rlib (no wasm-pack/target needed), and
      # its pass-prediction test now uses a fixed, committed fixture
      # (crates/sky_engine/tests/fixtures/iss_ephemeris_fixture.bin) instead of the
      # weekly-refreshed apps/web ephemeris, so it is deterministic here. Previously
      # this crate had no CI job, so a real `find_passes` regression could merge
      # unnoticed (issue #82).
      - name: Run sky_engine tests
        run: cargo test -p sky_engine

  rust-golden-test:
    name: Rust golden positions (macOS/Apple Silicon)
    # Pinned to a specific macOS Apple Silicon image (NOT macos-latest): the
    # golden_positions.rs constants are bit-exact against this platform's libm,
    # and macos-latest silently rolls to a newer image whose libm may round
    # trig 1-2 ULP differently, which would break the exact-equality suite on an
    # unrelated image bump. Bumping this pin is a deliberate, reviewed change
    # (and may require regenerating the constants on the new image — see the
    # regeneration procedure in tests/golden_positions.rs; do NOT add tolerances).
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."

      # Bit-exact golden position suite. Runs only on this pinned macOS/Apple
      # Silicon runner because its `assert_eq!` constants are platform-specific
      # (see the exclusion note in the Linux rust-test job above). Keep this to
      # the golden suite alone; the lib + Horizons suites are covered on Linux.
      - name: Run golden position tests
        run: cargo test -p sky_engine_core --test golden_positions

  typecheck:
    name: Typecheck (web)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The web typecheck imports generated bindings from src/wasm/sky_engine
      # (a gitignored build artifact), so the WASM module must be built first.
      - name: Build WASM module
        run: pnpm --filter once-around-web build:wasm

      - name: Typecheck
        run: pnpm --filter once-around-web typecheck
