name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-test:
    name: Unit tests (web geometry)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Geometry tests are pure TypeScript (no Rust / wasm-pack needed), so this
      # job intentionally omits the WASM build and stays well under the <10 s
      # acceptance threshold.
      - name: Run unit tests
        run: pnpm --filter once-around-web test:unit

  rust-test:
    name: Rust tests (sky_engine_core)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # Caches ~/.cargo registry/git plus the workspace target dir keyed on
      # Cargo.lock, so incremental runs skip recompiling unchanged dependencies.
      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."

      # Test-only job by design: the astronomy engine suites (unit tests,
      # golden-value regression, JPL Horizons accuracy) complete in well under
      # a minute, so an engine regression now fails CI instead of merging
      # unnoticed. Linting is intentionally excluded — there is a known
      # pre-existing clippy::approx_constant error and the package is not
      # rustfmt-clean (tracked separately in issue #66), which would otherwise
      # block this job.
      - name: Run Rust tests
        run: cargo test -p sky_engine_core

  typecheck:
    name: Typecheck (web)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The web typecheck imports generated bindings from src/wasm/sky_engine
      # (a gitignored build artifact), so the WASM module must be built first.
      - name: Build WASM module
        run: pnpm --filter once-around-web build:wasm

      - name: Typecheck
        run: pnpm --filter once-around-web typecheck
